name: CI

on:
  push:
    branches: [metabric, main]
  pull_request:
    branches: [metabric, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax — app.py
        run: python -m py_compile notebooks/app.py

      - name: Check syntax — api.py
        run: python -m py_compile notebooks/api.py

      - name: Check syntax — predict.py
        run: python -m py_compile notebooks/predict.py

      - name: Run prediction pipeline
        run: python notebooks/predict.py

      - name: Validate model loads and predicts
        run: |
          python - <<'EOF'
          import joblib, pandas as pd

          pipeline = joblib.load("models/pipeline.pkl")

          FEATURE_NAMES = [
              "age_at_diagnosis", "tumor_size", "neoplasm_histologic_grade",
              "lymph_nodes_examined_positive", "mutation_count", "nottingham_prognostic_index",
              "er_status", "her2_status", "pr_status", "chemotherapy",
              "hormone_therapy", "radio_therapy", "type_of_breast_surgery", "inferred_menopausal_state"
          ]

          sample = pd.DataFrame([[65, 28, 2, 1, 3, 4.5, 1, 0, 1, 0, 1, 1, 0, 1]],
                                 columns=FEATURE_NAMES)

          pred = pipeline.predict(sample)
          prob = pipeline.predict_proba(sample)

          assert pred[0] in [0, 1], "Prediction must be 0 or 1"
          assert abs(prob[0].sum() - 1.0) < 1e-6, "Probabilities must sum to 1"
          assert len(prob[0]) == 2, "Must return 2 class probabilities"

          print(f"Validation passed — prediction={pred[0]}, probabilities={prob[0].round(4)}")
          EOF
